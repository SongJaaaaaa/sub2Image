services:
  cloud-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cloud
      POSTGRES_USER: cloud
      POSTGRES_PASSWORD: ${CLOUD_DB_PASSWORD:?请设置 CLOUD_DB_PASSWORD}
    volumes:
      - cloud-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud -d cloud"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  cloud:
    build: .
    environment:
      DATABASE_URL: postgresql://cloud:${CLOUD_DB_PASSWORD:?请设置 CLOUD_DB_PASSWORD}@cloud-db:5432/cloud
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - cloud-files:/data/cloud
      - media-jobs:/data/media-jobs
    depends_on:
      cloud-db:
        condition: service_healthy
    restart: unless-stopped

  speech-worker:
    build: ../speech-worker
    volumes:
      - media-jobs:/data/media-jobs
      - speech-models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 30s
    restart: unless-stopped

volumes:
  cloud-db:
  cloud-files:
  media-jobs:
  speech-models:
