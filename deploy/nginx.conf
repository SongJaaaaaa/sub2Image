server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;
    add_header Referrer-Policy "unsafe-url" always;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /models/background-removal/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    location /api-proxy/ {
        limit_except POST OPTIONS {
            deny all;
        }

        if ($uri = "/api-proxy/") {
            return 403 "Forbidden: API Proxy path required";
        }

        # Docker 内置 DNS 仅解析 IPv4，避免服务器无 IPv6 路由时连接失败。
        resolver ${NGINX_LOCAL_RESOLVERS} ipv6=off valid=60s;
        set $api_proxy_url ${API_PROXY_URL};
        rewrite ^/api-proxy/(.*)$ /$1 break;
        proxy_pass $api_proxy_url$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    # END API PROXY

    # Sub2API 用户登录与密钥管理代理。
    location /sub2api-auth/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        # 使用部署时配置的 Sub2API 地址。
        rewrite ^/sub2api-auth/(.*)$ /api/v1/$1 break;
        proxy_pass ${SUB2API_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Sub2API OpenAI-compatible API 代理，供 Responses、Images 和 models 使用。
    location /sub2api-v1/ {
        limit_except GET POST OPTIONS {
            deny all;
        }

        # 使用部署时配置的 Sub2API 地址。
        rewrite ^/sub2api-v1/(.*)$ /v1/$1 break;
        proxy_pass ${SUB2API_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 独立云端存储服务，身份仍由请求中的 Sub2API access token 校验。
    location /cloud-api/ {
        limit_except GET POST PUT DELETE OPTIONS {
            deny all;
        }

        rewrite ^/cloud-api/(.*)$ /api/$1 break;
        proxy_pass http://cloud:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # 外层公开代理必须覆盖浏览器提交的 X-Forwarded-For；这里原样传递该可信地址。
        proxy_set_header X-Real-IP $http_x_forwarded_for;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }


    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
