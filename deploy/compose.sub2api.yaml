services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      SUB2API_URL: ${SUB2API_URL}
      DEFAULT_API_URL: ${SUB2API_URL}/v1
      API_PROXY_URL: ${SUB2API_URL}/v1
      ENABLE_API_PROXY: 'true'
      LOCK_API_PROXY: 'true'
      SHOW_DEFAULT_CONFIG_ONLY: 'false'
    ports:
      - '127.0.0.1:${APP_PORT:-8080}:80'
    depends_on:
      sub2-bridge:
        condition: service_healthy
    restart: unless-stopped

  sub2-bridge:
    build:
      context: ..
      dockerfile: deploy/sub2-bridge.Dockerfile
    environment:
      SUB2API_URL: ${SUB2API_URL}
      SUB2API_ADMIN_KEY: ${SUB2API_ADMIN_KEY}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8787/health']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
