services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      SUB2API_URL: ${SUB2API_URL}
      DEFAULT_API_URL: ${SUB2API_URL}/v1
      API_PROXY_URL: ${SUB2API_URL}/v1
      ENABLE_API_PROXY: 'true'
      LOCK_API_PROXY: 'true'
      SHOW_DEFAULT_CONFIG_ONLY: 'false'
    ports:
      - '127.0.0.1:${APP_PORT:-8080}:80'
    restart: unless-stopped
